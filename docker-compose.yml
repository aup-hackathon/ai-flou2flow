name: flou2flow

services:
  flou2flow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flou2flow-api
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2:1.5b}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      VISION_MODEL: ${VISION_MODEL:-llava}

      # Server
      HOST: ${HOST:-0.0.0.0}
      PORT: ${PORT:-8000}

      # NATS Configuration
      NATS_URL: ${NATS_URL:-nats://nats:4222}
    depends_on:
      - ollama
      - nats
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: flou2flow-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    # This command starts Ollama in the background, waits for it, pulls the model, and keeps it running
    command: bash -c "ollama serve & sleep 5 && ollama pull qwen2:1.5b && wait"

  nats:
    image: nats:latest
    container_name: flou2flow-nats
    ports:
      - "4222:4222"
      - "8222:8222" # Management port

volumes:
  ollama-models:

